<header class="navbar">
  <div class="navbar-left">
    <a routerLink="/dashboard" class="logo-link">
      <div class="logo-circle">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3c-3 0-6 3-6 7 0 3 2 6 6 10 4-4 6-7 6-10 0-4-3-7-6-7z"/>
          <path d="M12 14c-2 0-3-1-3-3s1-3 3-3 3 1 3 3-1 3-3 3z"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-title">ZenSpa</span>
        <span class="logo-subtitle">Bienestar</span>
      </div>
    </a>
  </div>

  <nav class="navbar-center">
    @for (item of itemsVisibles(); track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
        class="nav-link"
        (click)="mobileMenuAbierto.set(false)"
      >
        {{ item.label }}
      </a>
    }
  </nav>

  <div class="navbar-right">
    <button class="icon-btn search-btn" aria-label="Buscar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <path d="M21 21l-4.35-4.35"/>
      </svg>
    </button>

    <button class="icon-btn bell-btn" aria-label="Notificaciones">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      @if (notificacionesCount() > 0) {
        <span class="badge">{{ notificacionesCount() }}</span>
      }
    </button>

    <div class="user-area" (click)="toggleMenu()">
      <div class="avatar">{{ iniciales }}</div>
      <div class="user-info">
        <span class="user-name">{{ nombreUsuario }}</span>
        <span class="user-role">{{ rolUsuario }}</span>
      </div>
      <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>

      @if (menuAbierto()) {
        <div class="dropdown-menu">
          <button class="dropdown-item" (click)="logout(); $event.stopPropagation()">Cerrar sesión</button>
        </div>
      }
    </div>

    <button class="icon-btn hamburger" aria-label="Menú" (click)="toggleMobileMenu()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        @if (mobileMenuAbierto()) {
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        } @else {
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        }
      </svg>
    </button>
  </div>
</header>

@if (mobileMenuAbierto()) {
  <div class="mobile-nav">
    @for (item of itemsVisibles(); track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="active-mobile"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
        class="mobile-link"
        (click)="mobileMenuAbierto.set(false)"
      >
        {{ item.label }}
      </a>
    }
    <button class="mobile-link logout-link" (click)="logout()">Cerrar sesión</button>
  </div>
}
